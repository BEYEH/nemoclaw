name: ci

on:
  pull_request:
    branches: [release-kells, main-kells]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run basic checks
        uses: ./.github/actions/basic-checks

      - name: Run tests
        run: npm test
